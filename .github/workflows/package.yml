name: Publish API package (alpha on API changes)

on:
  push:
    branches: [ "**" ]
    paths:
      - 'src/**/api/**'
      - 'docs/api/**'
      - 'pom.xml'
      - '.github/workflows/package.yml'
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: api-alpha-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-alpha:
    name: Deploy alpha package to GitHub Packages (API changed)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Compute alpha version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          # Read current version from POM (root module only)
          POM_VERSION=$(mvn -q -Dexec.executable=echo \
            -Dexec.args='${project.version}' \
            --non-recursive org.codehaus.mojo:exec-maven-plugin:3.1.0:exec)

          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)

          # Strip common pre-release suffixes before appending our alpha
          # Examples: 0.9.6-alpha -> 0.9.6 ; 0.9.6-SNAPSHOT -> 0.9.6 ; 0.9.6-rc1 -> 0.9.6
          BASE_VERSION=$(echo "$POM_VERSION" | sed -E 's/-(alpha|snapshot|SNAPSHOT|rc[0-9]+)$//')

          NEW_VERSION="${BASE_VERSION}-alpha-${SHORT_SHA}"

          echo "POM_VERSION=$POM_VERSION"
          echo "BASE_VERSION=$BASE_VERSION"
          echo "NEW_VERSION=$NEW_VERSION"

          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build with alpha version
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -q versions:set -DnewVersion="${{ steps.meta.outputs.new_version }}"
          mvn -B -q -DskipTests package

      - name: Deploy to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Deploy using default layout required by GitHub Packages
          mvn -B -DskipTests deploy \
            -DaltDeploymentRepository="github::default::https://maven.pkg.github.com/${{ github.repository }}" \
            -DdeployAtEnd=true

  deploy-release:
    name: Deploy release package to GitHub Packages (on GitHub Release)
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Compute release version from tag
        id: rel
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            echo "No tag name found in release payload" >&2
            exit 1
          fi
          # Strip leading 'v' or 'V' if used (e.g., v1.2.3 -> 1.2.3)
          VERSION=${TAG_NAME#v}
          VERSION=${VERSION#V}
          echo "Computed release version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set project version and build
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -q versions:set -DnewVersion="${{ steps.rel.outputs.version }}"
          mvn -B -q -DskipTests package

      - name: Deploy release to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mvn -B -DskipTests deploy \
            -DaltDeploymentRepository="github::default::https://maven.pkg.github.com/${{ github.repository }}" \
            -DdeployAtEnd=true
