name: Modrinth Alpha (every commit)

on:
  push:
    branches: ['**'] # every branch
    paths-ignore:
      - 'workflows/**'
      - 'README.md'

permissions:
  contents: read

concurrency:
  group: modrinth-alpha-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for branch history/tags in changelog

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build with Maven (shade)
        run: |
          mvn -B -V -e -DskipTests package

      - name: Determine version and rename artifact
        id: meta
        run: |
          set -euo pipefail
          POM_VERSION=$(mvn -q -Dexec.executable=echo \
            -Dexec.args='${project.version}' \
            --non-recursive org.codehaus.mojo:exec-maven-plugin:3.1.0:exec)
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          VERSION="${POM_VERSION}-${SHORT_SHA}"

          # Prefer an explicit match; ignore -original jars if present
          shopt -s nullglob
          FILES=(target/VelocityPteroPower-*.jar)
          FILTERED=()
          for f in "${FILES[@]}"; do [[ "$f" != *-original.jar ]] && FILTERED+=("$f"); done
          if [ ${#FILTERED[@]} -lt 1 ]; then
            echo "No JARs found matching target/VelocityPteroPower-*.jar"
            ls -l target || true
            exit 1
          fi
          SRC="${FILTERED[0]}"
          DST="target/VelocityPteroPower-${VERSION}.jar"
          mv "$SRC" "$DST"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "artifact=${DST}" >> "$GITHUB_OUTPUT"

      - name: Build branch-wide changelog (Markdown)
        id: changelog
        run: |
          set -euo pipefail
          REPO="https://github.com/${GITHUB_REPOSITORY}"
          BRANCH="${GITHUB_REF_NAME}"

          # Ensure tags available for compare link
          git fetch --tags --force --prune >/dev/null 2>&1 || true

          LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo '')"
          if [ -n "$LAST_TAG" ]; then
            COMPARE_URL="${REPO}/compare/${LAST_TAG}...${GITHUB_SHA}"
          else
            FIRST_COMMIT="$(git rev-list --max-parents=0 HEAD | tail -n1)"
            COMPARE_URL="${REPO}/compare/${FIRST_COMMIT}...${GITHUB_SHA}"
          fi

          # Recent commits (last 20) on this branch
          RECENT_LOG="$(git log --first-parent -n 20 --pretty='- %h %s (%an)')"

          cat > changelog.md <<'MD'
## ⚠️ Alpha build

> This build is generated automatically on every commit and may be unstable or untested.  
> Need help? Join the Discord: https://discord.pluginz.dev

### Links
- Branch history: REPO/commits/BRANCH
- Full changes since last tag (or start): COMPARE_URL
- This commit: REPO/commit/GITHUB_SHA

### Recent changes on BRANCH (last 20)
RECENT_LOG
MD

          # Replace placeholders
          sed -i "s|REPO|${REPO}|g" changelog.md
          sed -i "s|BRANCH|${BRANCH}|g" changelog.md
          sed -i "s|COMPARE_URL|${COMPARE_URL}|g" changelog.md
          sed -i "s|GITHUB_SHA|${GITHUB_SHA}|g" changelog.md
          awk -v repl="${RECENT_LOG//$'\n'/'\n'}" '{gsub("RECENT_LOG", repl)}1' changelog.md > changelog.out && mv changelog.out changelog.md

          # Output raw markdown (no URL encoding)
          {
            echo "text<<EOF"
            cat changelog.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth (alpha)
        uses: WiIIiam278/mc-publish@hangar
        with:
          modrinth-id: 1dDr5J4w
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: false

          files-primary: ${{ steps.meta.outputs.artifact }}

          name: VelocityPteroPower Alpha • ${{ steps.meta.outputs.short_sha }}
          version: ${{ steps.meta.outputs.version }}
          version-type: alpha
          changelog: ${{ steps.changelog.outputs.text }}

          loaders: |
            velocity
          game-versions: |
            1.13
            1.13.1
            1.13.2
            1.14
            1.14.1
            1.14.2
            1.14.3
            1.14.4
            1.15
            1.15.1
            1.15.2
            1.16
            1.16.1
            1.16.2
            1.16.3
            1.16.4
            1.16.5
            1.17
            1.17.1
            1.18
            1.18.1
            1.18.2
            1.19
            1.19.1
            1.19.2
            1.19.3
            1.19.4
            1.20
            1.20.1
            1.20.2
            1.20.3
            1.20.4
            1.20.5
            1.20.6
            1.21
            1.21.1
            1.21.2
            1.21.3
            1.21.4
            1.21.5
            1.21.6
            1.21.7
            1.21.8
          java: 21