name: Modrinth Alpha (every commit)

on:
  push:
    branches: ['**'] # every branch
    paths-ignore:
      - 'workflows/**'
      - 'README.md'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build with Maven (shade)
        run: |
          mvn -B -V -e -DskipTests package

      - name: Determine version
        id: meta
        run: |
          POM_VERSION=$(mvn -q -Dexec.executable=echo \
            -Dexec.args='${project.version}' \
            --non-recursive org.codehaus.mojo:exec-maven-plugin:3.1.0:exec)
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          VERSION="${POM_VERSION}-${SHORT_SHA}"

          # Find the built JAR (first .jar in /target)
          JAR_FILE=$(ls target | grep -E '\.jar$' | head -n1)
          NEW_FILE="VelocityPteroPower-${VERSION}.jar"

          # Rename the jar so the filename includes version + commit
          mv "target/${JAR_FILE}" "target/${NEW_FILE}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "artifact=target/${NEW_FILE}" >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth (alpha)
        uses: WiIIiam278/mc-publish@hangar
        with:
          modrinth-id: 1dDr5J4w
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: false

          # Upload the renamed file
          files-primary: ${{ steps.meta.outputs.artifact }}

          # 🧩 Release metadata
          name: VelocityPteroPower Alpha • ${{ steps.meta.outputs.short_sha }}
          version: ${{ steps.meta.outputs.version }}
          version-type: alpha
          changelog: |
            **Commit:** [${{ steps.meta.outputs.short_sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            **Message:** ${{ github.event.head_commit.message }}

          loaders: |
            velocity
          game-versions: |
            1.13
            1.13.1
            1.13.2
            1.14
            1.14.1
            1.14.2
            1.14.3
            1.14.4
            1.15
            1.15.1
            1.15.2
            1.16
            1.16.1
            1.16.2
            1.16.3
            1.16.4
            1.16.5
            1.17
            1.17.1
            1.18
            1.18.1
            1.18.2
            1.19
            1.19.1
            1.19.2
            1.19.3
            1.19.4
            1.20
            1.20.1
            1.20.2
            1.20.3
            1.20.4
            1.20.5
            1.20.6
            1.21
            1.21.1
            1.21.2
            1.21.3
            1.21.4
            1.21.5
            1.21.6
            1.21.7
            1.21.8
          java: 21