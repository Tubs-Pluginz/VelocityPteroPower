name: Modrinth Alpha (every commit)

on:
  push:
    branches: ['**'] # every branch
    paths-ignore:
      - 'workflows/**'
      - 'README.md'

permissions:
  contents: read

concurrency:
  group: modrinth-alpha-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build with Maven (shade)
        run: |
          mvn -B -V -e -DskipTests package

      - name: Determine version and rename artifact
        id: meta
        run: |
          set -euo pipefail
          POM_VERSION=$(mvn -q -Dexec.executable=echo \
            -Dexec.args='${project.version}' \
            --non-recursive org.codehaus.mojo:exec-maven-plugin:3.1.0:exec)
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          VERSION="${POM_VERSION}-${SHORT_SHA}"

          # Prefer an explicit match; ignore -original jars if present
          shopt -s nullglob
          FILES=(target/VelocityPteroPower-*.jar)
          FILTERED=()
          for f in "${FILES[@]}"; do [[ "$f" != *-original.jar ]] && FILTERED+=("$f"); done
          if [ ${#FILTERED[@]} -lt 1 ]; then
            echo "No JARs found matching target/VelocityPteroPower-*.jar"
            ls -l target || true
            exit 1
          fi
          SRC="${FILTERED[0]}"
          DST="target/VelocityPteroPower-${VERSION}.jar"
          mv "$SRC" "$DST"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "artifact=${DST}" >> "$GITHUB_OUTPUT"

      - name: Build alpha changelog text
        id: changelog
        run: |
          set -euo pipefail
          {
            echo "## ⚠️ Alpha build"
            echo
            echo "> This build is generated automatically on every commit and may be unstable or untested."
            echo "> Need help? Join the Discord: https://discord.pluginz.dev"
            echo
            echo "### What's in testing (commits in this push)"
            # List commits included in this push event
            jq -r '.commits[] | "- " + .id[0:7] + " " + (.message | gsub("\r?\n"; " ")) + " (" + (.author.username // .author.name // "unknown") + ")"' \
              "$GITHUB_EVENT_PATH" || true
            echo
            echo "### Links"
            echo "- Branch history: https://github.com/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}"
            echo "- This commit: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
            echo "- Compare (last 20): https://github.com/${GITHUB_REPOSITORY}/compare/${GITHUB_REF_NAME}~20...${GITHUB_REF_NAME}"
          } > changelog.md

          # Escape for multiline output
          CONTENT="$(cat changelog.md)"
          CONTENT="${CONTENT//'%'/'%25'}"
          CONTENT="${CONTENT//$'\n'/'%0A'}"
          CONTENT="${CONTENT//$'\r'/'%0D'}"
          echo "text=$CONTENT" >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth (alpha)
        uses: WiIIiam278/mc-publish@hangar
        with:
          modrinth-id: 1dDr5J4w
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: false

          files-primary: ${{ steps.meta.outputs.artifact }}

          name: VelocityPteroPower Alpha • ${{ steps.meta.outputs.short_sha }}
          version: ${{ steps.meta.outputs.version }}
          version-type: alpha
          changelog: ${{ steps.changelog.outputs.text }}

          loaders: |
            velocity
          game-versions: |
            1.13
            1.13.1
            1.13.2
            1.14
            1.14.1
            1.14.2
            1.14.3
            1.14.4
            1.15
            1.15.1
            1.15.2
            1.16
            1.16.1
            1.16.2
            1.16.3
            1.16.4
            1.16.5
            1.17
            1.17.1
            1.18
            1.18.1
            1.18.2
            1.19
            1.19.1
            1.19.2
            1.19.3
            1.19.4
            1.20
            1.20.1
            1.20.2
            1.20.3
            1.20.4
            1.20.5
            1.20.6
            1.21
            1.21.1
            1.21.2
            1.21.3
            1.21.4
            1.21.5
            1.21.6
            1.21.7
            1.21.8
          java: 21